services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5673:5672"     # AMQP на 5673 (5672 может быть занят соседним проектом)
      - "15673:15672"   # management UI на 15673
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no --save ""
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  runner:
    build: .
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: bench
      RESULTS_DIR: /results
    volumes:
      - ./results:/results
    command: python -m app.runner
