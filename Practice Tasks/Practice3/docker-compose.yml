services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cache_bench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d cache_bench"]
      interval: 5s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512m

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no --save ""
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 256m

  runner:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bench:bench@postgres:5432/cache_bench
      REDIS_URL: redis://redis:6379/0
      RESULTS_DIR: /results
      DURATION: "30"
      N_KEYS: "1000"
      CONCURRENCY: "20"
    volumes:
      - ./results:/results
    command: python -m app.runner
